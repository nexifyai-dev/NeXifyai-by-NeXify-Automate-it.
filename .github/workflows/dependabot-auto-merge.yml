name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  auto-merge-dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge
        run: |
          # Wait a moment for any initial CI checks to start
          sleep 5
          
          # Enable auto-merge - GitHub will automatically merge when all checks pass
          gh pr merge --admin --auto "${{ github.event.pull_request.number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Report status
        run: |
          echo "✅ Auto-merge enabled for PR #${{ github.event.pull_request.number }}"
          echo "PR will be automatically merged once all checks pass"
